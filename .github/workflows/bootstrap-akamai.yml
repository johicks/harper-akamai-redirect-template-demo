name: Bootstrap Akamai Redirect Stack

on:
  workflow_dispatch:

env:
  ACCOUNT_SWITCH_KEY: ${{ vars.ACCOUNT_SWITCH_KEY }}
  AKAMAI_HOST: ${{ secrets.AKAMAI_HOST }}
  AKAMAI_CLIENT_TOKEN: ${{ secrets.AKAMAI_CLIENT_TOKEN }}
  AKAMAI_CLIENT_SECRET: ${{ secrets.AKAMAI_CLIENT_SECRET }}
  AKAMAI_ACCESS_TOKEN: ${{ secrets.AKAMAI_ACCESS_TOKEN }}
  HARBOR_USER: ${{ secrets.HARBOR_USER }}
  HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Akamai CLI and required packages
        run: |
          curl -sL -o $RUNNER_TEMP/akamai https://github.com/akamai/cli/releases/download/v2.0.2/akamai-v2.0.2-linuxamd64
          chmod +x $RUNNER_TEMP/akamai
          sudo mv $RUNNER_TEMP/akamai /usr/local/bin/akamai
          akamai install edgeworkers
          akamai install property-manager

      - name: Configure Akamai CLI credentials
        run: |
          # Fail if any required secrets are missing/empty
          missing=()
          for var in AKAMAI_HOST AKAMAI_CLIENT_TOKEN AKAMAI_CLIENT_SECRET AKAMAI_ACCESS_TOKEN; do
            if [ -z "${!var:-}" ]; then
              echo "::error title=Missing secret::$var is not set."
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            exit 1
          fi

          cat > ~/.edgerc <<EOF
          [default]
          host = $AKAMAI_HOST
          client_token = $AKAMAI_CLIENT_TOKEN
          client_secret = $AKAMAI_CLIENT_SECRET
          access_token = $AKAMAI_ACCESS_TOKEN
          
          [papi]
          host = $AKAMAI_HOST
          client_token = $AKAMAI_CLIENT_TOKEN
          client_secret = $AKAMAI_CLIENT_SECRET
          access_token = $AKAMAI_ACCESS_TOKEN
          EOF

      - name: Install HTTPie EdgeGrid helper
        run: |
          python -m pip install --upgrade pip
          pip install httpie httpie-edgegrid

      - name: Load Akamai config
        id: cfg
        run: |
          FILE="akamai/bootstrap-config.json"
          jq -e . "$FILE" >/dev/null || { echo "Invalid JSON $FILE"; exit 1; }

          # Basic lookups (quote-safe; empty => '')
          get() { jq -r "$1 // \"\"" "$FILE"; }

          echo "contractId=$(get '.akamai_account.contractId')" >> $GITHUB_OUTPUT
          echo "groupId=$(get '.akamai_account.groupId')" >> $GITHUB_OUTPUT

          echo "ew_create=$(get '.akamai_edgeworker.create')" >> $GITHUB_OUTPUT
          echo "ew_name=$(get '.akamai_edgeworker.name')" >> $GITHUB_OUTPUT
          echo "ew_tier=$(get '.akamai_edgeworker.resourceTierId')" >> $GITHUB_OUTPUT
          echo "harper_base_url=$(get '.akamai_edgeworker.harperRedirectBaseUrl')" >> $GITHUB_OUTPUT

          echo "prop_create=$(get '.akamai_property.create')" >> $GITHUB_OUTPUT
          echo "productId=$(get '.akamai_property.productId')" >> $GITHUB_OUTPUT
          echo "network=$(get '.akamai_property.network')" >> $GITHUB_OUTPUT
          echo "prop_name=$(get '.akamai_property.name')" >> $GITHUB_OUTPUT
          echo "edge_hostname=$(get '.akamai_property.edgeHostname')" >> $GITHUB_OUTPUT
          echo "cname_target=$(get '.akamai_property.cnameTarget')" >> $GITHUB_OUTPUT
          echo "origin_host=$(get '.akamai_property.originHostname')" >> $GITHUB_OUTPUT
          echo "harper_host=$(get '.akamai_property.sendHostHeader')" >> $GITHUB_OUTPUT

          echo "flag_upload_json=$(get '.harper_app.uploadRedirectJSON')" >> $GITHUB_OUTPUT
          echo "harper_deploy=$(get '.harper_app.deploy')" >> $GITHUB_OUTPUT
          echo "harper_deploy_url=$(get '.harper_app.deployUrl')" >> $GITHUB_OUTPUT
          echo "harper_redirector_repo=$(get '.harper_app.redirectorRepoUrl')" >> $GITHUB_OUTPUT

      - name: Deploy Harper redirector app
        if: ${{ steps.cfg.outputs.harper_deploy == 'true' }}
        env:
          HARBOR_USER: ${{ env.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ env.HARBOR_PASSWORD }}
          HARPER_DEPLOY_URL: ${{ steps.cfg.outputs.harper_deploy_url }}
          HARPER_REDIRECTOR_REPO: ${{ steps.cfg.outputs.harper_redirector_repo }}
        run: |
          set -euo pipefail

          if [ -z "${HARBOR_USER:-}" ] || [ -z "${HARBOR_PASSWORD:-}" ]; then
            echo "::error title=Missing Harbor secret::HARBOR_USER or HARBOR_PASSWORD is not set."
            exit 1
          fi

          if [ -z "${HARPER_DEPLOY_URL:-}" ]; then
            echo "::error title=Missing Harper URL::harper_app.deployUrl is empty in akamai/bootstrap-config.json"
            exit 1
          fi

          if [ -z "${HARPER_REDIRECTOR_REPO:-}" ]; then
            echo "::error title=Missing Harper redirector repo::harper_app.redirectorRepoUrl is empty in akamai/bootstrap-config.json"
            exit 1
          fi

          echo "Deploying Harper redirector app from '${HARPER_REDIRECTOR_REPO}' to ${HARPER_DEPLOY_URL} using template's npm scripts"

          # Install Harper CLI (if the app's scripts need it)
          npm install -g harperdb

          APP_DIR="$RUNNER_TEMP/harper-redirector-app"
          rm -rf "$APP_DIR"
          git clone "$HARPER_REDIRECTOR_REPO" "$APP_DIR"
          cd "$APP_DIR"

          # Install app dependencies
          npm install

          # Configure .env for non-interactive deploy; adjust keys if the template expects different names.
          cat > .env <<EOF
          HARPERDB_USERNAME=${HARBOR_USER}
          HARPERDB_PASSWORD=${HARBOR_PASSWORD}
          HARPERDB_URL=${HARPER_DEPLOY_URL}
          EOF

          # Deploy using the app's deploy script
          npm run deploy
            replicated=true

      - name: Create EdgeWorker
        id: create_ew
        if: ${{ steps.cfg.outputs.ew_create == 'true' }}
        run: |
          OUT="$RUNNER_TEMP/ew.json"; ERR="$RUNNER_TEMP/ew.err"
          
          # Build PM CLI account switch args
          PM_ARGS=()
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            PM_ARGS+=(--accountkey "$ACCOUNT_SWITCH_KEY")
          fi

          akamai edgeworkers register \
            --resourceTierId "${{ steps.cfg.outputs.ew_tier }}" \
            "${{ steps.cfg.outputs.groupId }}" \
            "${{ steps.cfg.outputs.ew_name }}" \
            --jsonout \
            "${PM_ARGS[@]}" 1>"$OUT" 2>"$ERR"

          # strip everything before the first '{' then parse
          EW_ID=$(sed -e '1s/^[^{]*//' "$OUT" | jq -r '.data[0].edgeWorkerId')

          [ -n "$EW_ID" ] || { echo "::error::edgeWorkerId not found"; echo "stdout:"; cat "$OUT"; echo "stderr:"; cat "$ERR"; exit 1; }
          echo "ew_id=$EW_ID" >> "$GITHUB_OUTPUT"


      - name: Inject HARPER_BASE_URL into EdgeWorker
        if: ${{ steps.cfg.outputs.ew_create == 'true' }}
        run: |
          sed -i "s|const HARPER_BASE_URL = 'https://YOUR-HARPER-HOST/checkredirect';|const HARPER_BASE_URL = '${{ steps.cfg.outputs.harper_base_url }}';|" akamai/edgeworker/main.js


      - name: Upload EW bundle
        if: ${{ steps.cfg.outputs.ew_create == 'true' }}
        run: |
          cd akamai/edgeworker
          tar -czvf ew-bundle.tar.gz --exclude='.*' *
          
          # Build PM CLI account switch args
          PM_ARGS=()
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            PM_ARGS+=(--accountkey "$ACCOUNT_SWITCH_KEY")
          fi

          akamai edgeworkers upload \
            --bundle ew-bundle.tar.gz \
            "${PM_ARGS[@]}" \
            ${{ steps.create_ew.outputs.ew_id }}
        

      - name: Activate EW on staging
        if: ${{ steps.cfg.outputs.ew_create == 'true' }}
        run: |
          
          # Build PM CLI account switch args
          PM_ARGS=()
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            PM_ARGS+=(--accountkey "$ACCOUNT_SWITCH_KEY")
          fi
          
          akamai edgeworkers activate "${{ steps.create_ew.outputs.ew_id }}" \
            staging \
            0.1 \
            "${PM_ARGS[@]}"
      
      
      - name: Create edge hostname via PAPI
        if: ${{ steps.cfg.outputs.prop_create == 'true' }}
        env:
          CONTRACT_ID: ${{ steps.cfg.outputs.contractId }}
          GROUP_ID: ${{ steps.cfg.outputs.groupId }}
          PRODUCT_ID: ${{ steps.cfg.outputs.productId }}
          EDGE_HOSTNAME: ${{ steps.cfg.outputs.edge_hostname }}
          NETWORK: ${{ steps.cfg.outputs.network }}
        run: |
          set -euo pipefail

          if [ -z "${EDGE_HOSTNAME:-}" ]; then
            echo "edgeHostname empty; skipping edge hostname creation."
            exit 0
          fi

          PREFIX="${EDGE_HOSTNAME%%.*}"
          SUFFIX="${EDGE_HOSTNAME#*.}"

          if [ "$SUFFIX" != "akamaized.net" ]; then
            echo "::error::This step only supports akamaized.net hostnames; got '$SUFFIX'."
            exit 1
          fi

          echo "Edge hostname prefix=$PREFIX, suffix=$SUFFIX, productId=$PRODUCT_ID"
          
          if [ "${NETWORK:-}" = "enhancedTLS" ]; then
            BODY=$(jq -n \
            --arg product "$PRODUCT_ID" \
            --arg prefix "$PREFIX" \
            --arg suffix "$SUFFIX" \
            '{
              productId: $product,
              domainPrefix: $prefix,
              domainSuffix: $suffix,
              ipVersionBehavior: "IPV4",
              secureNetwork: "SHARED_CERT",
              secure: "true"
            }')
          else
            BODY=$(jq -n \
            --arg product "$PRODUCT_ID" \
            --arg prefix "$PREFIX" \
            --arg suffix "$SUFFIX" \
            '{
              productId: $product,
              domainPrefix: $prefix,
              domainSuffix: $suffix,
              ipVersionBehavior: "IPV4",
              secureNetwork: "SHARED_CERT"
            }')
          fi

          echo "Creating edge hostname '$EDGE_HOSTNAME' via PAPI (SHARED_CERT)"
          set +e
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            printf '%s\n' "$BODY" | http --auth-type=edgegrid -a papi: \
              POST :/papi/v1/edgehostnames \
              contractId=="$CONTRACT_ID" \
              groupId=="$GROUP_ID" \
              accountSwitchKey=="$ACCOUNT_SWITCH_KEY" \
              PAPI-Use-Prefixes:false \
              Content-Type:application/json
          else
            printf '%s\n' "$BODY" | http --auth-type=edgegrid -a papi: \
              POST :/papi/v1/edgehostnames \
              contractId=="$CONTRACT_ID" \
              groupId=="$GROUP_ID" \
              PAPI-Use-Prefixes:false \
              Content-Type:application/json
          fi
          RC=$?
          set -e

          if [ "$RC" -ne 0 ]; then
            echo "::warning::Edge hostname create may have failed (possibly already exists). Check Control Center if hostname-update later fails."
          fi


      - name: Create/Update Property from template
        id: create_property
        if: ${{ steps.cfg.outputs.prop_create == 'true' }}
        env:
          PROP_NAME: ${{ steps.cfg.outputs.prop_name }}
          CONTRACT_ID: ${{ steps.cfg.outputs.contractId }}
          GROUP_ID: ${{ steps.cfg.outputs.groupId }}
          PRODUCT_ID: ${{ steps.cfg.outputs.productId }}
          ORIGIN_HOST: ${{ steps.cfg.outputs.origin_host }}
          SEND_HOST_HEADER: ${{ steps.cfg.outputs.harper_host }}
          NETWORK: ${{ steps.cfg.outputs.network }}
        run: |
          set -euo pipefail

          if [ -z "$PROP_NAME" ]; then
            echo "::error title=Missing property name::akamai_property.name is empty in akamai/bootstrap-config.json"
            exit 1
          fi

          TEMPLATE_FILE="akamai/property/harper-redirect-template.v1.default.json"
          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "::error title=Missing template file::$TEMPLATE_FILE not found"
            exit 1
          fi

          # Build PM CLI account switch args (shared for search/property-update/etc.)
          PM_ARGS=()
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            PM_ARGS+=(--accountSwitchKey "$ACCOUNT_SWITCH_KEY")
          fi

          search_property_id() {
            # Returns propertyId or empty string
            akamai property-manager search "$PROP_NAME" --format json "${PM_ARGS[@]}" \
              | jq -r '.[0].propertyId // empty'
          }

          echo "Checking if property '$PROP_NAME' already exists via property-manager search..."
          PROP_ID="$(search_property_id || true)"

          if [ -z "$PROP_ID" ]; then
            echo "Property '$PROP_NAME' not found. Creating new property on contract $CONTRACT_ID, group $GROUP_ID, product $PRODUCT_ID"

            NEW_PROP_ARGS=()
            if [ "${NETWORK:-}" = "enhancedTLS" ]; then
              NEW_PROP_ARGS+=(--secure)
            fi

            akamai property-manager new-property \
              -c "$CONTRACT_ID" \
              -g "$GROUP_ID" \
              -d "$PRODUCT_ID" \
              -p "$PROP_NAME" \
              "${NEW_PROP_ARGS[@]}" \
              "${PM_ARGS[@]}"

            echo "Property creation requested. Waiting for it to be visible in PAPI..."

            # Poll until property shows up in search
            for i in $(seq 1 10); do
              PROP_ID="$(search_property_id || true)"
              if [ -n "$PROP_ID" ]; then
                echo "Property '$PROP_NAME' is now visible with id '$PROP_ID' (attempt $i)."
                break
              fi
              echo "Property '$PROP_NAME' not visible yet (attempt $i). Sleeping 10s..."
              sleep 10
            done
          else
            echo "Property '$PROP_NAME' already exists with id '$PROP_ID'."
          fi

          if [ -z "$PROP_ID" ]; then
            echo "::error::Property '$PROP_NAME' never became visible in search; aborting."
            exit 1
          fi

          echo "prop_id=$PROP_ID" >> "$GITHUB_OUTPUT"

          # Prepare a rules file with origin/host header overridden from bootstrap-config
          RULES_FILE="$RUNNER_TEMP/${PROP_NAME}-rules.json"
          cp "$TEMPLATE_FILE" "$RULES_FILE"

          if [ -n "${ORIGIN_HOST:-}" ]; then
            echo "Setting origin hostname to '$ORIGIN_HOST' in rules JSON"
            jq --arg host "$ORIGIN_HOST" \
              '.rules.behaviors |= (map(if .name == "origin" then (.options.hostname = $host) else . end))' \
              "$RULES_FILE" > "$RULES_FILE.tmp"
            mv "$RULES_FILE.tmp" "$RULES_FILE"
          fi

          if [ -n "${SEND_HOST_HEADER:-}" ]; then
            echo "Setting forward host header to custom '$SEND_HOST_HEADER' in rules JSON"
            jq --arg send "$SEND_HOST_HEADER" \
              '.rules.behaviors |= (map(if .name == "origin" then (.options.forwardHostHeader = "CUSTOM" | .options.customForwardHostHeader = $send) else . end))' \
              "$RULES_FILE" > "$RULES_FILE.tmp"
            mv "$RULES_FILE.tmp" "$RULES_FILE"
          fi

          echo "Updating rules for property id '$PROP_ID' from $RULES_FILE"
          PROP_VER=$(
              akamai property-manager property-update \
                  -p "$PROP_ID" \
                  --file "$RULES_FILE" \
                  --message "Initialize/update from harper-redirect-template.v1.default.json" \
                  "${PM_ARGS[@]}" \
              | jq -r '.propertyVersion // empty'
          )
          echo "prop_ver=$PROP_VER" >> "$GITHUB_OUTPUT"

      
      - name: Update property hostnames
        if: ${{ steps.cfg.outputs.prop_create == 'true' }}
        env:
          PROP_ID: ${{ steps.create_property.outputs.prop_id }}
          PROP_VER: ${{ steps.create_property.outputs.prop_ver }}
          CONTRACT_ID: ${{ steps.cfg.outputs.contractId }}
          GROUP_ID: ${{ steps.cfg.outputs.groupId }}
          EDGE_HOSTNAME: ${{ steps.cfg.outputs.edge_hostname }}
          CNAME_TARGET: ${{ steps.cfg.outputs.cname_target }}
          NETWORK: ${{ steps.cfg.outputs.network }}
        run: |
          set -euo pipefail

          if [ -z "${PROP_ID:-}" ]; then
            echo "::error::prop_id missing from create_property step"
            exit 1
          fi

          if [ -z "${EDGE_HOSTNAME:-}" ] || [ -z "${CNAME_TARGET:-}" ]; then
            echo "edgeHostname or cnameTarget is empty in akamai/bootstrap-config.json; skipping hostname update."
            exit 0
          fi

          # Build PM CLI account switch args
          PM_ARGS=()
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            PM_ARGS+=(--accountSwitchKey "$ACCOUNT_SWITCH_KEY")
          fi

          HOSTNAMES_FILE="$RUNNER_TEMP/${PROP_ID}-hostnames.json"
          echo "Creating hostnames mapping JSON at $HOSTNAMES_FILE"
          # hostname-update expects an array of hostname objects.
          jq -n --arg from "$CNAME_TARGET" --arg to "$EDGE_HOSTNAME" \
            '[{ cnameFrom: $from, cnameTo: $to, cnameType: "EDGE_HOSTNAME", edgeHostnameId: null }]' > "$HOSTNAMES_FILE"

          echo "Updating hostnames for property id '$PROP_ID' on version $PROP_VER using hostname-update"
          akamai property-manager hostname-update \
            -p "$PROP_ID" \
            --propver "$PROP_VER" \
            --file "$HOSTNAMES_FILE" \
            "${PM_ARGS[@]}"
          
          
      - name: Activate property on staging
        if: ${{ steps.cfg.outputs.prop_create == 'true' }}
        env:
          PROP_ID: ${{ steps.create_property.outputs.prop_id }}
          PROP_VER: ${{ steps.create_property.outputs.prop_ver }}
        run: |
          set -euo pipefail

          if [ -z "${PROP_ID:-}" ] || [ -z "${PROP_VER:-}" ]; then
            echo "::error::prop_id or prop_ver missing; cannot activate property"
            exit 1
          fi

          PM_ARGS=()
          if [ -n "${ACCOUNT_SWITCH_KEY:-}" ]; then
            PM_ARGS+=(--accountSwitchKey "$ACCOUNT_SWITCH_KEY")
          fi

          echo "Activating property '$PROP_ID' version '$PROP_VER' on STAGING"
          akamai property-manager activate-version \
            -p "$PROP_ID" \
            --propver "$PROP_VER" \
            --network STAGING \
            "${PM_ARGS[@]}"