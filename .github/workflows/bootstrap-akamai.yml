name: Bootstrap Akamai Redirect Stack

on:
  workflow_dispatch:

env:
  ACCOUNT_SWITCH_KEY: ${{ vars.ACCOUNT_SWITCH_KEY }}
  AKAMAI_HOST: ${{ secrets.AKAMAI_HOST }}
  AKAMAI_CLIENT_TOKEN: ${{ secrets.AKAMAI_CLIENT_TOKEN }}
  AKAMAI_CLIENT_SECRET: ${{ secrets.AKAMAI_CLIENT_SECRET }}
  AKAMAI_ACCESS_TOKEN: ${{ secrets.AKAMAI_ACCESS_TOKEN }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Akamai CLI and required packages
        run: |
          curl -sL -o $RUNNER_TEMP/akamai https://github.com/akamai/cli/releases/download/v2.0.2/akamai-v2.0.2-linuxamd64
          chmod +x $RUNNER_TEMP/akamai
          sudo mv $RUNNER_TEMP/akamai /usr/local/bin/akamai
          akamai install edgeworkers
          akamai install property-manager

      - name: Configure Akamai CLI credentials
        run: |
          # Fail if any required secrets are missing/empty
          missing=()
          for var in AKAMAI_HOST AKAMAI_CLIENT_TOKEN AKAMAI_CLIENT_SECRET AKAMAI_ACCESS_TOKEN; do
            if [ -z "${!var:-}" ]; then
              echo "::error title=Missing secret::$var is not set."
              missing+=("$var")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            exit 1
          fi

          cat > ~/.edgerc <<'EOF'
          [default]
          host = AKAMAI_HOST
          client_token = AKAMAI_CLIENT_TOKEN
          client_secret = AKAMAI_CLIENT_SECRET
          access_token = AKAMAI_ACCESS_TOKEN
          EOF

      - name: Load Akamai config
        id: cfg
        run: |
          FILE="akamai/bootstrap-config.json"
          jq -e . "$FILE" >/dev/null || { echo "Invalid JSON $FILE"; exit 1; }

          # Basic lookups (quote-safe; empty => '')
          get() { jq -r "$1 // \"\"" "$FILE"; }

          echo "contractId=$(get '.account.contractId')" >> $GITHUB_OUTPUT
          echo "groupId=$(get '.account.groupId')" >> $GITHUB_OUTPUT
          echo "productId=$(get '.account.productId')" >> $GITHUB_OUTPUT

          echo "ew_create=$(get '.edgeworker.create')" >> $GITHUB_OUTPUT
          echo "ew_name=$(get '.edgeworker.name')" >> $GITHUB_OUTPUT
          echo "ew_tier=$(get '.edgeworker.resourceTierId')" >> $GITHUB_OUTPUT

          echo "prop_create=$(get '.property.create')" >> $GITHUB_OUTPUT
          echo "prop_name=$(get '.property.name')" >> $GITHUB_OUTPUT
          echo "edge_hostname=$(get '.property.edgeHostname')" >> $GITHUB_OUTPUT
          echo "cname_target=$(get '.property.cnameTarget')" >> $GITHUB_OUTPUT
          echo "origin_host=$(get '.property.originHostname')" >> $GITHUB_OUTPUT

          echo "harper_base=$(get '.routing.harperRedirectBaseUrl')" >> $GITHUB_OUTPUT
          echo "harper_host=$(get '.routing.sendHostHeader')" >> $GITHUB_OUTPUT

          echo "flag_upload_csv=$(get '.flags.uploadRedirectCSV')" >> $GITHUB_OUTPUT

      - name: Prepare account switch arg
        id: acct
        run: |
          if [ -n "${{ vars.ACCOUNT_SWITCH_KEY }}" ]; then
            echo "args=--accountkey ${{ vars.ACCOUNT_SWITCH_KEY }}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Create EdgeWorker
        id: create_ew
        if: ${{ steps.cfg.outputs.ew_create == 'true' }}
        run: |
          OUT="$RUNNER_TEMP/ew.json"
          akamai edgeworkers register \
            --resourceTierId "${{ steps.cfg.outputs.ew_tier }}" \
            "${{ steps.cfg.outputs.groupId }}" \
            "${{ steps.cfg.outputs.ew_name }}" \
            --jsonout \
            ${{ steps.acct.outputs.args }}) > "$OUT" 2>&1

          # Capture the numeric ID field from JSON
          EW_ID=$(jq -r '(.data[0].edgeWorkerId // .edgeWorkerId) // empty' "$OUT")

          echo "EdgeWorker ID: $EW_ID"
          echo "ew_id=$EW_ID" >> $GITHUB_OUTPUT

      - name: Upload EW bundle
        if: ${{ steps.cfg.outputs.flag_upload_ew == 'true' }}
        run: |
          cd akamai/edgeworker
          tar -czvf ew-bundle.tar.gz --exclude='.*' *

          akamai edgeworkers upload \
            --bundle ew-bundle.tgz \
            ${{ steps.create_ew.outputs.ew_id }}
            ${{ steps.acct.outputs.args }}

      - name: Activate EW on staging
        run: |
          akamai edgeworkers activate "${{ steps.create_ew.outputs.ew_id }}" \
            staging --version 0.1 \
            --section "${{ steps.cfg.outputs.section }}" \
            ${{ steps.acct.outputs.args }}