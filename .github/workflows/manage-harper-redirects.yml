name: Manage Harper Redirects

on:
  push:
    paths:
      - 'harper-redirects/redirects.json'
  workflow_dispatch:

jobs:
  update-redirects:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get install -y jq httpie

      - name: Load Configuration
        run: |
          FILE="bootstrap-config.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::Config file $FILE not found"
            exit 1
          fi
          
          # Extract deployUrl
          deployUrl=$(jq -r '.harper_app.deployUrl // empty' "$FILE")
          
          if [ -z "$deployUrl" ]; then
             echo "::error::harper_app.deployUrl missing in $FILE"
             exit 1
          fi
          
          echo "deployUrl=$deployUrl" >> $GITHUB_OUTPUT

      - name: Sync Deletions
        env:
          HARPER_DEPLOY_URL: ${{ steps.config.outputs.deployUrl }}
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          cat <<EOF > sync_deletions.py
          import os
          import json
          import subprocess
          import urllib.request
          import urllib.parse
          import ssl
          import base64

          FILE_PATH = 'harper-redirects/redirects.json'
          DEPLOY_URL = os.environ.get('HARPER_DEPLOY_URL')
          HARBOR_USER = os.environ.get('HARBOR_USER')
          HARBOR_PASSWORD = os.environ.get('HARBOR_PASSWORD')

          def get_file_content(commit):
              try:
                  cmd = ['git', 'show', f'{commit}:{FILE_PATH}']
                  val = subprocess.check_output(cmd, stderr=subprocess.DEVNULL).decode('utf-8')
                  return json.loads(val)
              except Exception:
                  return {'data': []}

          def run():
              if not (DEPLOY_URL and HARBOR_USER and HARBOR_PASSWORD):
                  print("::error::Missing required environment variables for deletion sync")
                  exit(1)

              print(f"Comparing HEAD to HEAD~1 for {FILE_PATH}...")
              
              # Load Current (from disk)
              try:
                  with open(FILE_PATH, 'r') as f:
                      current_data = json.load(f).get('data', [])
              except FileNotFoundError:
                  print("Current file not found, assuming all deleted or empty.")
                  current_data = []

              # Load Previous (from git history)
              previous_data = get_file_content('HEAD~1').get('data', [])

              current_paths = {r['path'] for r in current_data}
              to_delete = [r for r in previous_data if r['path'] not in current_paths]
              
              print(f"Found {len(to_delete)} redirects to delete.")

              if not to_delete:
                  return

              auth_str = f"{HARBOR_USER}:{HARBOR_PASSWORD}"
              b64_auth = base64.b64encode(auth_str.encode()).decode()
              
              ctx = ssl.create_default_context()
              ctx.check_hostname = False
              ctx.verify_mode = ssl.CERT_NONE

              headers = {
                  "Authorization": f"Basic {b64_auth}"
              }

              for item in to_delete:
                  path = item['path']
                  # DELETE /rule/?path=...
                  # Ensure path is properly quoted
                  encoded_path = urllib.parse.quote(path)
                  url = f"{DEPLOY_URL}/rule/?path={encoded_path}"
                  
                  req = urllib.request.Request(url, method='DELETE', headers=headers)
                  
                  try:
                      print(f"Deleting path: {path}")
                      urllib.request.urlopen(req, context=ctx)
                  except Exception as e:
                      # We log but continue, as requested by user ("scalability issue" concern -> best effort clean up)
                      print(f"::warning::Failed to delete {path}: {e}")

          if __name__ == '__main__':
              run()
          EOF
          
          python3 sync_deletions.py

      - name: Upload Redirects
        env:
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          UPLOAD_URL: ${{ steps.config.outputs.deployUrl }}/redirect
        run: |
          if [ -z "$HARBOR_USER" ] || [ -z "$HARBOR_PASSWORD" ]; then
             echo "::error::Missing HARBOR_USER or HARBOR_PASSWORD secrets"
             exit 1
          fi

          echo "Uploading harper-redirects/redirects.json to $UPLOAD_URL"
          
          http --ignore-stdin --check-status -a "$HARBOR_USER:$HARBOR_PASSWORD" \
            POST "$UPLOAD_URL" \
            Content-Type:application/json \
            @harper-redirects/redirects.json
