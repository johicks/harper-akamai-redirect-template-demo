name: Manage Harper Redirects

on:
  push:
    paths:
      - 'harper-redirects/*.json'
  workflow_dispatch:

jobs:
  update-redirects:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: |
          sudo apt-get install -y jq httpie

      - name: Load Configuration
        id: config
        run: |
          FILE="bootstrap-config.json"
          if [ ! -f "$FILE" ]; then
            echo "::error::Config file $FILE not found"
            exit 1
          fi
          
          # Extract deployUrl
          deployUrl=$(jq -r '.harper_app.deployUrl // empty' "$FILE")
          
          if [ -z "$deployUrl" ]; then
             echo "::error::harper_app.deployUrl missing in $FILE"
             exit 1
          fi
          
          echo "deployUrl=$deployUrl" >> $GITHUB_OUTPUT

      - name: Sync and Upload Redirects
        env:
          HARPER_DEPLOY_URL: ${{ steps.config.outputs.deployUrl }}
          HARBOR_USER: ${{ secrets.HARBOR_USER }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          cat <<EOF > sync_redirects.py
          import os
          import json
          import subprocess
          import urllib.request
          import urllib.parse
          import ssl
          import base64

          REDIRECTS_DIR = 'harper-redirects'
          DEPLOY_URL = os.environ.get('HARPER_DEPLOY_URL')
          HARBOR_USER = os.environ.get('HARBOR_USER')
          HARBOR_PASSWORD = os.environ.get('HARBOR_PASSWORD')

          def get_git_file_content(commit, filepath):
              try:
                  cmd = ['git', 'show', f'{commit}:{filepath}']
                  val = subprocess.check_output(cmd, stderr=subprocess.DEVNULL).decode('utf-8')
                  return json.loads(val)
              except Exception:
                  return {'data': []}

          def get_changed_files():
              # Detect files changed in the targeted directory
              cmd = ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD', '--', REDIRECTS_DIR]
              output = subprocess.check_output(cmd).decode('utf-8')
              return [f for f in output.splitlines() if f.endswith('.json')]

          def sync_file(filepath):
              print(f"Processing {filepath}...")
              
              # 1. Deletions Logic
              try:
                  with open(filepath, 'r') as f:
                      current_data = json.load(f).get('data', [])
              except (FileNotFoundError, json.JSONDecodeError):
                  current_data = []

              previous_data = get_git_file_content('HEAD~1', filepath).get('data', [])
              
              current_paths = {r['path'] for r in current_data}
              to_delete = [r for r in previous_data if r['path'] not in current_paths]
              
              # Setup Auth
              auth_str = f"{HARBOR_USER}:{HARBOR_PASSWORD}"
              b64_auth = base64.b64encode(auth_str.encode()).decode()
              headers = {"Authorization": f"Basic {b64_auth}", "Content-Type": "application/json"}
              ctx = ssl.create_default_context()
              ctx.check_hostname = False
              ctx.verify_mode = ssl.CERT_NONE

              # Execute Deletions
              if to_delete:
                  print(f"  Found {len(to_delete)} deletions.")
                  for item in to_delete:
                      path = item['path']
                      url = f"{DEPLOY_URL}/rule/?path={urllib.parse.quote(path)}"
                      req = urllib.request.Request(url, method='DELETE', headers=headers)
                      try:
                          urllib.request.urlopen(req, context=ctx)
                          # print(f"  Deleted: {path}") # Reduce noise
                      except Exception as e:
                          print(f"  ::warning::Failed to delete {path}: {e}")
              else:
                  print("  No deletions found.")

              # 2. Upload Logic (Upsert)
              if current_data:
                  print(f"  Uploading {len(current_data)} rules from {filepath}...")
                  url = f"{DEPLOY_URL}/redirect"
                  # We need to post the whole file content
                  req = urllib.request.Request(url, method='POST', headers=headers, data=json.dumps({'data': current_data}).encode('utf-8'))
                  try:
                      urllib.request.urlopen(req, context=ctx)
                      print("  Upload successful.")
                  except Exception as e:
                      print(f"  ::error::Failed to upload {filepath}: {e}")

          def run():
              if not (DEPLOY_URL and HARBOR_USER and HARBOR_PASSWORD):
                  print("::error::Missing required environment variables")
                  exit(1)

              changed_files = get_changed_files()
              if not changed_files:
                  print("No .json files changed in this commit.")
                  return

              for f in changed_files:
                  sync_file(f)

          if __name__ == '__main__':
              run()
          EOF
          
          python3 sync_redirects.py
